    ];

    // ---------- 核心状态 ----------
    let wordList = [];               // 当前使用的词库 (打乱)
    let currentIndex = 0;           // 当前单词在 wordList 中的索引
    let score = 0;
    let totalAttempts = 0;          // 已处理单词数 (包括跳过/完成)
    let answered = false;           // 当前题目是否已答 (防止重复操作)
    let currentWordObj = null;      // 当前单词对象 { en, zh }
    let currentOptions = [];        // 当前四个选项 [zh1, zh2, zh3, zh4]
    let correctAnswer = '';         // 当前正确中文

    // DOM 元素
    const wordEnEl = document.getElementById('currentWordEn');
    const hintEl = document.getElementById('currentHint');
    const wordInput = document.getElementById('wordInput');
    const checkBtn = document.getElementById('checkWordBtn');
    const optionsBtns = document.querySelectorAll('.option-btn');
    const feedbackText = document.getElementById('feedbackText');
    const feedbackEmoji = document.querySelector('.feedback-message .emoji');
    const scoreSpan = document.getElementById('scoreDisplay');
    const totalSpan = document.getElementById('totalDisplay');
    const progressSpan = document.getElementById('progressDisplay');
    const nextBtn = document.getElementById('nextWordBtn');
    const resetBtn = document.getElementById('resetBtn');

    // ---------- 辅助函数 ----------
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // 从词库中随机取 4 个不同中文 (包含正确中文)
    function generateOptions(correctZh, excludeEn) {
      const allZh = wordList.map(w => w.zh);
      const uniqueZh = [...new Set(allZh)];
      let candidates = uniqueZh.filter(z => z !== correctZh);
      while (candidates.length < 3) {
        candidates.push('★');
      }
      const shuffledCandidates = shuffleArray([...candidates]);
      const distractors = shuffledCandidates.slice(0, 3);
      let opts = [correctZh, ...distractors];
      opts = shuffleArray(opts);
      return opts;
    }

    // 重置当前题目 (载入新词)
    function loadWord(index) {
      answered = false;
      wordInput.disabled = false;
      wordInput.value = '';
      wordInput.focus();
      optionsBtns.forEach(btn => {
        btn.disabled = false;
        btn.classList.remove('correct', 'wrong');
      });
      checkBtn.disabled = false;

      const word = wordList[index];
      if (!word) {
        wordEnEl.textContent = '🎉 完成!';
        hintEl.textContent = '所有单词已练习';
        feedbackText.textContent = '太棒啦！点击「重新开始」再来一轮';
        feedbackEmoji.textContent = '🏆';
        optionsBtns.forEach(btn => { btn.disabled = true; });
        wordInput.disabled = true;
        checkBtn.disabled = true;
        return;
      }
      currentWordObj = word;
      correctAnswer = word.zh;
      wordEnEl.textContent = word.en;
      hintEl.textContent = `✏️ 输入 "${word.en}" 并选择正确中文`;

      currentOptions = generateOptions(correctAnswer, word.en);
      optionsBtns.forEach((btn, idx) => {
        btn.textContent = currentOptions[idx] || '?';
        btn.dataset.correct = (currentOptions[idx] === correctAnswer) ? 'true' : 'false';
        btn.classList.remove('correct', 'wrong');
        btn.disabled = false;
      });

      feedbackText.textContent = `输入单词，再选中文`;
      feedbackEmoji.textContent = '⌨️';
    }

    function updateStats() {
      scoreSpan.textContent = score;
      totalSpan.textContent = wordList.length;
      const done = Math.min(totalAttempts, wordList.length);
      progressSpan.textContent = `${done}/${wordList.length}`;
    }

    function isAllDone() {
      return currentIndex >= wordList.length;
    }

    function onOptionClick(e) {
      const btn = e.currentTarget;
      if (answered) return;
      if (isAllDone()) return;
      if (btn.disabled) return;

      const typed = wordInput.value.trim();
      if (typed.toLowerCase() !== currentWordObj.en.toLowerCase()) {
        feedbackText.textContent = `❌ 请先正确输入 "${currentWordObj.en}"`;
        feedbackEmoji.textContent = '⌨️';
        wordInput.focus();
        return;
      }

      const isCorrect = btn.dataset.correct === 'true';
      answered = true;
      optionsBtns.forEach(b => b.disabled = true);
      wordInput.disabled = true;
      checkBtn.disabled = true;

      optionsBtns.forEach(b => {
        if (b.dataset.correct === 'true') {
          b.classList.add('correct');
        } else {
          b.classList.add('wrong');
        }
      });

      if (isCorrect) {
        score++;
        feedbackText.textContent = `🎉 正确！ +1分 (${currentWordObj.en} = ${currentWordObj.zh})`;
        feedbackEmoji.textContent = '🌟';
      } else {
        feedbackText.textContent = `😓 选错了，正确是 “${correctAnswer}”`;
        feedbackEmoji.textContent = '💪';
      }

      totalAttempts++;
      updateStats();

      if (currentIndex >= wordList.length - 1) {
        setTimeout(() => {
          if (currentIndex >= wordList.length - 1) {
            loadWord(wordList.length);
            updateStats();
          }
        }, 300);
      }
    }

    function nextWord() {
      if (isAllDone()) return;
      if (!answered && !isAllDone()) {
        const typed = wordInput.value.trim();
        if (typed.toLowerCase() !== currentWordObj.en.toLowerCase()) {
          feedbackText.textContent = `⚠️ 先正确输入 "${currentWordObj.en}" 再继续`;
          feedbackEmoji.textContent = '✏️';
          wordInput.focus();
          return;
        }
        feedbackText.textContent = `👀 请选择一个中文意思`;
        feedbackEmoji.textContent = '👇';
        return;
      }
      currentIndex++;
      if (currentIndex >= wordList.length) {
        loadWord(wordList.length);
        updateStats();
        return;
      }
      loadWord(currentIndex);
      updateStats();
      if (currentIndex >= wordList.length) {
        loadWord(wordList.length);
        updateStats();
      }
    }

    function resetGame() {
      wordList = shuffleArray([...FULL_WORDS]);
      currentIndex = 0;
      score = 0;
      totalAttempts = 0;
      answered = false;
      updateStats();
      loadWord(0);
      wordInput.disabled = false;
      wordInput.focus();
      feedbackText.textContent = '新的一轮！加油 💪';
      feedbackEmoji.textContent = '🚀';
      optionsBtns.forEach(btn => btn.disabled = false);
      checkBtn.disabled = false;
    }

    // ---------- 事件绑定 ----------
    optionsBtns.forEach(btn => {
      btn.addEventListener('click', onOptionClick);
    });

    checkBtn.addEventListener('click', function() {
      if (isAllDone()) return;
      if (answered) return;
      const typed = wordInput.value.trim();
      if (typed.toLowerCase() === currentWordObj.en.toLowerCase()) {
        feedbackText.textContent = `✅ 打字正确！现在选中文意思`;
        feedbackEmoji.textContent = '👆';
      } else {
        feedbackText.textContent = `❌ 输入 "${currentWordObj.en}"`;
        feedbackEmoji.textContent = '⌨️';
        wordInput.value = '';
        wordInput.focus();
      }
    });

    wordInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        checkBtn.click();
      }
    });

    nextBtn.addEventListener('click', nextWord);
    resetBtn.addEventListener('click', resetGame);

    // ---------- 初始化 ----------
    resetGame();
  })();
</script>
</body>
</html>
